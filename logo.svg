<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFAD33"/>
      <stop offset="100%" stop-color="#F48120"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
    <filter id="screenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Monitor body -->
  <rect x="12" y="12" width="136" height="108" rx="10" fill="#2D2D3A" stroke="#3D3D4A" stroke-width="2"/>

  <!-- Screen bezel -->
  <rect x="20" y="18" width="120" height="84" rx="4" fill="url(#screen)"/>

  <!-- Scanlines (retro CRT effect) -->
  <g opacity="0.08">
    <line x1="22" y1="28" x2="138" y2="28" stroke="#FFA500" stroke-width="0.5"/>
    <line x1="22" y1="34" x2="138" y2="34" stroke="#FFA500" stroke-width="0.5"/>
    <line x1="22" y1="40" x2="138" y2="40" stroke="#FFA500" stroke-width="0.5"/>
    <line x1="22" y1="46" x2="138" y2="46" stroke="#FFA500" stroke-width="0.5"/>
    <line x1="22" y1="52" x2="138" y2="52" stroke="#FFA500" stroke-width="0.5"/>
    <line x1="22" y1="58" x2="138" y2="58" stroke="#FFA500" stroke-width="0.5"/>
    <line x1="22" y1="64" x2="138" y2="64" stroke="#FFA500" stroke-width="0.5"/>
    <line x1="22" y1="70" x2="138" y2="70" stroke="#FFA500" stroke-width="0.5"/>
    <line x1="22" y1="76" x2="138" y2="76" stroke="#FFA500" stroke-width="0.5"/>
    <line x1="22" y1="82" x2="138" y2="82" stroke="#FFA500" stroke-width="0.5"/>
    <line x1="22" y1="88" x2="138" y2="88" stroke="#FFA500" stroke-width="0.5"/>
    <line x1="22" y1="94" x2="138" y2="94" stroke="#FFA500" stroke-width="0.5"/>
  </g>

  <!-- "do86" on screen in amber phosphor -->
  <text x="80" y="68" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="30" fill="url(#glow)" filter="url(#screenGlow)">do86</text>

  <!-- Blinking cursor -->
  <rect x="120" y="56" width="14" height="3" rx="1" fill="#FFAD33" opacity="0.7"/>

  <!-- Monitor stand -->
  <path d="M 60 120 L 68 132 L 92 132 L 100 120" fill="#2D2D3A" stroke="#3D3D4A" stroke-width="1.5"/>
  <rect x="58" y="132" width="44" height="4" rx="2" fill="#3D3D4A"/>

  <!-- Power LED -->
  <circle cx="136" cy="108" r="2.5" fill="#F48120" opacity="0.9"/>

  <!-- CPU chip pins along left side of monitor -->
  <g fill="#5A5A6A">
    <rect x="4" y="28" width="10" height="3" rx="1"/>
    <rect x="4" y="38" width="10" height="3" rx="1"/>
    <rect x="4" y="48" width="10" height="3" rx="1"/>
    <rect x="4" y="58" width="10" height="3" rx="1"/>
    <rect x="4" y="68" width="10" height="3" rx="1"/>
    <rect x="4" y="78" width="10" height="3" rx="1"/>
    <rect x="4" y="88" width="10" height="3" rx="1"/>
    <rect x="4" y="98" width="10" height="3" rx="1"/>
  </g>

  <!-- CPU chip pins along right side -->
  <g fill="#5A5A6A">
    <rect x="146" y="28" width="10" height="3" rx="1"/>
    <rect x="146" y="38" width="10" height="3" rx="1"/>
    <rect x="146" y="48" width="10" height="3" rx="1"/>
    <rect x="146" y="58" width="10" height="3" rx="1"/>
    <rect x="146" y="68" width="10" height="3" rx="1"/>
    <rect x="146" y="78" width="10" height="3" rx="1"/>
    <rect x="146" y="88" width="10" height="3" rx="1"/>
    <rect x="146" y="98" width="10" height="3" rx="1"/>
  </g>

  <!-- Cloud wisps behind the monitor (edge computing vibe) -->
  <g opacity="0.15" fill="#F48120">
    <ellipse cx="30" cy="8" rx="18" ry="7"/>
    <ellipse cx="55" cy="5" rx="22" ry="8"/>
    <ellipse cx="85" cy="7" rx="16" ry="6"/>
    <ellipse cx="115" cy="4" rx="20" ry="7"/>
    <ellipse cx="140" cy="8" rx="14" ry="6"/>
  </g>

  <!-- "do86" main wordmark -->
  <text x="190" y="82" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Courier New', monospace" font-weight="800" font-size="64" fill="#E6E6E6" letter-spacing="-2">do86</text>

  <!-- Tagline -->
  <text x="192" y="110" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Courier New', monospace" font-weight="400" font-size="13" fill="#8B949E">x86 emulation at the edge</text>
</svg>
