<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>do86</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;flex-direction:column;align-items:center}
    .container{max-width:640px;width:100%;padding:80px 24px 48px}
    .brand{text-align:center;margin-bottom:48px}
    .brand h1{font-size:36px;font-weight:700;letter-spacing:-1px;color:#f97316}
    .brand p{color:#8b949e;font-size:15px;margin-top:8px}
    .grid{display:flex;flex-direction:column;gap:12px}
    .card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px 20px;display:flex;align-items:center;gap:16px;transition:border-color .15s}
    .card:hover{border-color:#f97316}
    .card-body{flex:1;min-width:0}
    .card h3{font-size:15px;font-weight:600;color:#e6edf3;margin-bottom:4px}
    .card p{font-size:13px;color:#8b949e;line-height:1.4}
    .card-meta{font-size:11px;color:#484f58;margin-top:6px}
    .card-actions{flex-shrink:0;display:flex;gap:6px}
    .btn-backend{display:inline-flex;align-items:center;gap:5px;background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:border-color .15s,background .15s,opacity .15s;white-space:nowrap}
    .btn-backend:hover:not(:disabled){border-color:#8b949e;background:#30363d}
    .btn-backend:disabled{opacity:.45;cursor:default}
    .btn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .btn-dot--v86{background:#3fb950}
    .btn-dot--smp{background:#58a6ff}
    .btn-dot--qemu{background:#484f58}
    .btn-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#484f58;margin-left:2px}
    .btn-spinner{display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer{text-align:center;color:#484f58;font-size:12px;margin-top:48px}
    /* Skeleton loading state for cards */
    .grid-loading{text-align:center;color:#484f58;font-size:13px;padding:32px 0}
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <h1>do86</h1>
      <p>x86 operating systems running on Cloudflare Durable Objects</p>
    </div>
    <div class="grid" id="grid">
      <div class="grid-loading">Loading images&hellip;</div>
    </div>
    <div class="footer">VMs are shared per image &mdash; instant boot via state snapshots.</div>
  </div>
  <script>
    function launch(backend, image, btn) {
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span>';
      var id = crypto.randomUUID();
      var prefix = backend === 'v86-smp' ? '/smp/' : '/s/';
      location.href = prefix + id + '?image=' + image;
    }

    function backendButtons(img) {
      var bs = img.backends || ['v86'];
      var html = '';
      // v86 button
      if (bs.indexOf('v86') !== -1) {
        html += '<button class="btn-backend" onclick="launch(\'v86\',\'' + img.key + '\',this)">' +
          '<span class="btn-dot btn-dot--v86"></span>v86</button>';
      }
      // SMP button
      if (bs.indexOf('v86-smp') !== -1) {
        html += '<button class="btn-backend" onclick="launch(\'v86-smp\',\'' + img.key + '\',this)">' +
          '<span class="btn-dot btn-dot--smp"></span>SMP</button>';
      }
      // QEMU button (always shown, always disabled)
      html += '<button class="btn-backend" disabled>' +
        '<span class="btn-dot btn-dot--qemu"></span>QEMU<span class="btn-tag">Soon</span></button>';
      return html;
    }

    (async function() {
      var grid = document.getElementById('grid');
      try {
        var res = await fetch('/api/images');
        var images = await res.json();
        grid.innerHTML = images.map(function(img) {
          var media = img.drive === 'fda' ? 'Floppy' : 'CD-ROM';
          return '<div class="card">' +
            '<div class="card-body">' +
              '<h3>' + img.label + '</h3>' +
              '<p>' + img.description + '</p>' +
              '<div class="card-meta">' + media + ' \u00b7 ' + img.memory + ' MB RAM</div>' +
            '</div>' +
            '<div class="card-actions">' + backendButtons(img) + '</div>' +
          '</div>';
        }).join('');
      } catch (e) {
        grid.innerHTML = '<div class="grid-loading">Failed to load images. Reload to retry.</div>';
      }
    })();
  </script>
</body>
</html>
